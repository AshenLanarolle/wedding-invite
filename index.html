<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --gold: #D4AF37;
            --cream: #FFFCF5;
            --text: #333;
        }
        body {
            margin: 0; background-color: var(--cream);
            font-family: 'Poppins', sans-serif; color: var(--text);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            width: 90%; max-width: 500px; background: white;
            padding: 40px 20px; border: 8px double var(--gold);
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.2rem; margin-bottom: 10px; }
        .guest-name { font-weight: bold; font-size: 1.2rem; color: #555; margin-bottom: 20px; }
        .couples { margin: 30px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 20px 0; }
        .couple-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
        .details { margin: 20px 0; font-size: 0.9rem; line-height: 1.6; }
        .btn {
            display: inline-block; padding: 12px 25px; background: var(--gold);
            color: white; text-decoration: none; border-radius: 25px;
            transition: transform 0.3s; margin-top: 20px;
        }
        .btn:hover { transform: scale(1.05); }
        .lotus-icon { width: 50px; opacity: 0.6; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card animate__animated animate__fadeIn">
    <img src="https://cdn-icons-png.flaticon.com/512/2833/2833314.png" class="lotus-icon" alt="Lotus">
    <div class="animate__animated animate__fadeInDown animate__delay-1s">
        <p>Ayubowan!</p>
        <div class="guest-name" id="guestName">Dear Guest,</div>
        <p>We cordially invite you to celebrate the union of</p>
    </div>

    <div class="couples animate__animated animate__zoomIn animate__delay-2s">
        <div class="couple-name">Pasindu & Isuni</div>
        <div style="margin: 5px 0;">&</div>
        <div class="couple-name">Ashen & Chathuni</div>
    </div>

    <div class="details animate__animated animate__fadeInUp animate__delay-3s">
        <strong>Venue:</strong> Vinrich Lake Resort, Bolgoda<br>
        <strong>Poruwa Ceremony:</strong> 9:48 AM<br>
        <strong>Date:</strong> [Insert Date Here]
        <br><br>
        <small>Contact: 0710348109 / 0714986214</small>
    </div>

    <a href="https://maps.app.goo.gl/YourGoogleMapsLink" class="btn" target="_blank">📍 View Location</a>
</div>

<script>
    // This script reads the URL and changes the name automatically
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get('guest');
    if (name) {
        document.getElementById('guestName').innerText = "Dear " + decodeURIComponent(name) + ",";
    }
</script>

</body>
</html>
